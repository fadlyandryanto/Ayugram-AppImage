name: Build and Release AyuGram AppImage
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    permissions:
      contents: write
    steps:
      - name: Install git
        run: pacman -Syy --noconfirm git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize pacman keys and Chaotic AUR
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst' 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'
          echo -e "\n[chaotic-aur]\nInclude = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf
          pacman -Syy --noconfirm

      - name: Query latest version
        id: version
        run: |
          LATEST_VERSION=$(pacman -Si chaotic-aur/ayugram-desktop-git | grep -E '^Version' | awk '{print $3}')
          if [ -z "$LATEST_VERSION" ]; then
            echo "Package not found!" >&2
            exit 1
          fi
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Check if new version
        id: check
        run: |
          LATEST="${{ steps.version.outputs.latest_version }}"
          CURRENT=$(cat VERSION 2>/dev/null || echo "none")
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "No new version. Skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $LATEST"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Build AppImage
        if: steps.check.outputs.should_build == 'true'
        run: |
          pacman -S --noconfirm base-devel patchelf wget xorg-server-xvfb chaotic-aur/ayugram-desktop-git
          wget -q "https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools/quick-sharun.sh" -O ./quick-sharun
          chmod +x ./quick-sharun
          wget -q "https://github.com/pkgforge-dev/appimagetool/releases/latest/download/appimagetool-x86_64-linux" -O appimagetool
          chmod +x appimagetool
          export MAIN_BIN="AyuGram"
          export ICON="/usr/share/icons/hicolor/256x256/apps/com.ayugram.desktop.png"
          export DESKTOP="/usr/share/applications/com.ayugram.desktop.desktop"
          export APPDIR="${PWD}/AppDir"
          export OUTPUT_APPIMAGE=0
          ./quick-sharun /usr/bin/AyuGram
          rm -rf "$APPDIR"/share/{alsa,X11,terminfo,mime,licenses,xml,doc,man,gtk-doc}
          VERSION="${{ steps.check.outputs.new_version }}"
          export VERSION="$VERSION"
          export OPTIMIZE_LAUNCH=1
          export OPTIMIZE_LAUNCH_TIMEOUT=30
          export DWARFS_COMP="zstd:level=22 -S26 -B6"
          export OUTNAME="ayugram-desktop-${VERSION}-$(uname -m).AppImage"
          mkdir -p "$PWD/dist"
          xvfb-run -a ./appimagetool "$APPDIR" -o ./dist

      - name: Update VERSION file and commit
        if: steps.check.outputs.should_build == 'true'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.check.outputs.new_version }}" > VERSION
          git add VERSION
          git commit -m "Update AyuGram to ${{ steps.check.outputs.new_version }}" || echo "No changes"
          git push

      - name: Create Release
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.new_version }}
          name: AyuGram Desktop ${{ steps.check.outputs.new_version }}
          body: "Automatic build for version ${{ steps.check.outputs.new_version }} from Arch Linux."
          files: dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
